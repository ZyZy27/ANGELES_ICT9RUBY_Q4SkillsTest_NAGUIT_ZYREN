<!DOCTYPE html>
<html lang="en">
<head>
  <title>Enroll Now</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>

    body {
      background-color: #1a6fa8;
      font-family: 'Gill Sans', 'Gill Sans MT', 'Nunito', Calibri, 'Trebuchet MS', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-image: url(bg.png);
      background-size: cover;
    }

   
    .top-nav {
      background-color: transparent;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .top-nav .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-nav .logo-area img {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background-color: #ccc;
      object-fit: cover;
    }

    .top-nav .school-name {
      color: white;
      font-weight: 400;
      font-size: 18px;
      line-height: 1.25;
    }

    .top-nav .school-name span {
      font-size: 12px;
      font-weight: 400;
      display: block;
      letter-spacing: 0.5px;
    }

    .top-nav .back-btn {
      color: white;
      font-size: 22px;
      cursor: pointer;
      opacity: 0.8;
      background: none;
      border: none;
      line-height: 1;
    }

    .top-nav .back-btn:hover {
      opacity: 1;
    }

    
    .page-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px 60px;
      min-height: calc(100vh - 95px);
    }

  
    .signin-card {
      background-color: #e8f0f8;
      border-radius: 0;
      padding: 42px 38px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
    }

    .signin-card .card-title {
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      color: #1a1a1a;
      margin-bottom: 28px;
    }


    .form-label {
      font-size: 13px;
      font-weight: 400;
      color: #222;
      margin-bottom: 5px;
    }

    .form-control {
      background-color: #f5f8fc;
      border: 1px solid #d0dce8;
      border-radius: 0;
      font-size: 14px;
      padding: 10px 14px;
      color: #333;
      transition: border-color 0.2s;
    }

    .form-control:focus {
      border-color: #1a6fa8;
      box-shadow: 0 0 0 3px rgba(26, 111, 168, 0.15);
      background-color: #fff;
    }


    .password-wrapper {
      position: relative;
    }

    .password-wrapper .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #888;
      font-size: 16px;
      padding: 0;
      line-height: 1;
    }

    .password-wrapper .toggle-pw:hover {
      color: #1a6fa8;
    }


    .form-check-label {
      font-size: 13px;
      color: #444;
    }

    .forgot-link {
      font-size: 13px;
      color: #1a6fa8;
      text-decoration: none;
      font-weight: 400;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

  
    .btn-signin {
      background-color: #3a8fd4;
      color: white;
      border: none;
      border-radius: 0;
      font-size: 15px;
      font-weight: 400;
      padding: 11px;
      width: 100%;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .btn-signin:hover {
      background-color: #1a6fa8;
    }

    .btn-signin:active {
      transform: scale(0.98);
    }


    .card-divider {
      border-top: 1px solid #c8d8e8;
      margin: 22px 0 0;
    }



  </style>
</head>

<body>


  <div class="top-nav">

    <div class="logo-area">
      <img src="Scho.png" alt="School Logo">
      <div class="school-name">
        New Age Scholars<br>University inc.
        <span>ESTD. 2026</span>
      </div>
    </div>

    <button class="back-btn" onclick="history.back()" title="Go back">&#8249;</button>

  </div>


  <div class="page-wrapper">

    <div class="signin-card">

      <div class="row">
        <div class="col-12">
          <div class="card-title">Enroll Now</div>
        </div>
      </div>


      <div class="row mb-3">
        <div class="col-12">
          <label class="form-label" for="name">Full Name</label>
          <input
            type="text"
            class="form-control"
            id="name"
            placeholder=""
          >
        </div>
      </div>


      <div class="row mb-3">
        <div class="col-12">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder=""
            >
            <button class="toggle-pw" type="button" onclick="togglePassword()" id="toggleBtn" title="Show/hide password">
              &#128065;
            </button>
          </div>
        </div>
      </div>

     
      <div class="row mb-4">
        <div class="col-6 d-flex align-items-center">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="keepSignedIn">
            <label class="form-check-label" for="keepSignedIn">
              Keep me signed in
            </label>
          </div>
        </div>
        <div class="col-6 text-end d-flex align-items-center justify-content-end">
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
      </div>

    
      <div class="row">
        <div class="col-12">
          <button class="btn-signin" onclick="signup()" type="submit">Enroll Now</button>
        </div>
      </div>

      <div class="card-divider"></div>

    </div>

  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let accounts = JSON.parse(localStorage.getItem('accounts')) || [];

    function togglePassword() {
      const input = document.getElementById('password');
      const btn = document.getElementById('toggleBtn');
      if (input.type === 'password') {
        input.type = 'text';
        btn.style.color = '#1a6fa8';
      } else {
        input.type = 'password';
        btn.style.color = '#888';
      }
    }

    function genstudid(){
      return Math.floor(10000 + Math.random() * 90000).toString();
    }

    function signup(){
      let name = document.getElementById('name').value;
      let password = document.getElementById('password').value;

      let studid = genstudid();
      if (name === '' || password === ''){
        alert("Fill in all fields");
        return;
      }

      accounts.push({
        name: name,
        password: password,
        studid: studid
      });

      localStorage.setItem('accounts', JSON.stringify(accounts));
      alert("You have been Enrolled!\nYour student ID is: " + studid);

      window.location.href = 'login.html';
    }
  </script>

</body>
</html>
